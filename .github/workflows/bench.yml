name: bench

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/evlog/src/**'
      - 'packages/evlog/bench/**'
      - 'packages/evlog/tsdown.config.ts'
      - 'packages/evlog/vitest.config.ts'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: Build evlog package
        run: bunx turbo run build --filter=evlog

      - name: Measure bundle size (PR)
        working-directory: packages/evlog
        run: bun bench/size.ts --json > /tmp/size-current.json

      - name: Run benchmarks (PR)
        working-directory: packages/evlog
        run: bun run bench

      - name: Save PR results
        run: cp packages/evlog/bench/results.json /tmp/bench-current.json

      - name: Checkout base branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          clean: false

      - name: Install dependencies (base)
        run: bun install

      - name: Build evlog package (base)
        run: bunx turbo run build --filter=evlog

      - name: Measure bundle size (base)
        working-directory: packages/evlog
        run: |
          if [ -f bench/size.ts ]; then
            bun bench/size.ts --json > /tmp/size-baseline.json
          else
            echo '{"entries":[],"total":{"raw":0,"gzip":0}}' > /tmp/size-baseline.json
          fi

      - name: Run benchmarks (base)
        working-directory: packages/evlog
        run: |
          if grep -q '"bench"' package.json 2>/dev/null; then
            bun run bench
            cp bench/results.json /tmp/bench-baseline.json
          else
            echo '{"files":[]}' > /tmp/bench-baseline.json
          fi

      - name: Checkout PR branch (for compare script)
        uses: actions/checkout@v6

      - name: Install dependencies
        run: bun install

      - name: Compare results
        id: compare
        working-directory: packages/evlog
        run: |
          set +e
          ARGS=""
          if [ -f /tmp/bench-baseline.json ] && [ -f /tmp/bench-current.json ]; then
            ARGS="$ARGS --bench /tmp/bench-baseline.json /tmp/bench-current.json"
          fi
          if [ -f /tmp/size-baseline.json ] && [ -f /tmp/size-current.json ]; then
            ARGS="$ARGS --size /tmp/size-baseline.json /tmp/size-current.json"
          fi
          REPORT=$(bun bench/compare.ts $ARGS)
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "report<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$REPORT" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.compare.outputs.report }}`;
            const marker = '<!-- evlog-bench -->';
            const fullBody = `${marker}\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
